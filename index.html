<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#080d08" />
    <meta name="msapplication-navbutton-color" content="#080d08" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA / Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="goPay" />
    <meta name="application-name" content="goPay" />

    <!-- App Info -->
    <meta name="description" content="Tanzania's super app for payments, travel, and more — Powered by goPay" />
    <meta name="keywords" content="goPay, Tanzania, M-Pesa, mobile money, fintech, malipo" />
    <meta name="author" content="goPay Tanzania" />

    <!-- Open Graph -->
    <meta property="og:title" content="goPay Tanzania" />
    <meta property="og:description" content="Programu bora ya fedha Tanzania. Lipa, Tuma, Safari na zaidi." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Prevent phone number / address detection -->
    <meta name="format-detection" content="telephone=no, address=no, email=no" />

    <!-- Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />

    <!-- iOS Splash Screens (for PWA install) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>goPay Tanzania</title>

    <style>
      /* Prevent overscroll bounce on iOS / Android */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #080d08;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Hide scrollbars globally for native-app feel */
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
      /* Prevent text selection on tap */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* Safe area insets for notched devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
